<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>體適能瑜珈社 - 暑期課程行事曆</title>
  
  <link href="https://fonts.googleapis.com/css2?family=Klee+One:wght@400;600&display=swap" rel="stylesheet">
  
  <script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.10/index.global.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>

  <style>
    /* 基本版面與卡片設定 */
    body { font-family: 'Klee One', cursive; background-color: #FCF9F2; color: #333; padding: 20px; display: flex; justify-content: center; }
    .container { width: 100%; max-width: 900px; text-align: center; } 
    .card { background: #FFF; border: 2px dashed #D7C68A; border-radius: 15px; padding: 30px; margin-bottom: 20px; }
    
    /* 表單與按鈕元件 */
    input, select { width: 90%; padding: 10px; margin: 10px 0; border: 1px dashed #CCC; border-radius: 8px; font-family: 'Klee One', cursive; font-size: 16px; }
    button { background-color: #F9E4D4; border: none; padding: 10px 25px; border-radius: 20px; font-size: 16px; font-family: 'Klee One', cursive; cursor: pointer; transition: 0.3s; margin-top: 10px; }
    button:hover { background-color: #F2D2BC; }    
    table { width: 100%; border-collapse: collapse; margin-top: 15px; }
    th, td { border-bottom: 1px dashed #D7C68A; padding: 10px; text-align: left; }
    .loader { font-size: 14px; color: #888; margin-top: 10px; }
    
    /* 詳情與狀態標籤 */
    .detail-box { background-color: #FDFBF7; border: 1px solid #B8A86F; border-radius: 8px; padding: 15px; margin: 10px auto; text-align: left; font-size: 15px; width: 85%; box-shadow: 2px 2px 8px rgba(0,0,0,0.05); }
    .detail-box p { margin: 8px 0; color: #555; }
    .detail-box strong { color: #4A4A4A; }
    .btn-cancel { background-color: #F5F5F5; color: #666; padding: 5px 12px; border-radius: 12px; font-size: 13px; border: 1px solid #CCC; margin-top: 0; }
    .btn-cancel:hover { background-color: #E0E0E0; }
    .status-canceled { color: #B8A86F; font-size: 13px; font-weight: bold; }

    /* 彈窗樣式 */
    .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.4); display: flex; justify-content: center; align-items: center; z-index: 1000; }
    .modal-box { background: #FFF; border: 2px dashed #B8A86F; border-radius: 15px; padding: 25px; text-align: center; max-width: 320px; width: 80%; box-shadow: 0px 4px 15px rgba(0,0,0,0.1); }
    .modal-buttons { margin-top: 20px; display: flex; justify-content: space-around; gap: 10px; }
    .btn-confirm { background-color: #F9E4D4; width: 100%; }
    .btn-confirm:hover { background-color: #F2D2BC; }
    .btn-close { background-color: #F5F5F5; color: #666; width: 100%; border: 1px solid #CCC; padding: 10px 25px; border-radius: 20px; font-size: 16px; font-family: 'Klee One', cursive; cursor: pointer; }
    .hidden { display: none; }

    
    /* ====== FullCalendar 行事曆專屬樣式 ====== */
    .fc { font-family: 'Klee One', cursive; }
    .fc .fc-toolbar-title { font-weight: 600; color: #333; }
    .fc .fc-button-primary { background-color: #B8A86F; border: none; border-radius: 8px; }
    .fc .fc-button-primary:hover, .fc .fc-button-primary:active { background-color: #D7C68A !important; }
    
    .fc-event {
      border: none !important;
      border-radius: 4px !important;
      padding: 4px !important; /* 稍微增加內距讓文字更舒適 */
      margin-bottom: 3px !important;
      box-shadow: 1px 1px 3px rgba(0,0,0,0.1);
    }
    .fc-event-title {
      color: #333 !important; 
      font-weight: 600 !important;
      font-size: 14px;
    }

    /* ====== 📱 RWD 手機版響應式設定 ====== */
    @media (max-width: 768px) {
      body { padding: 10px; }
      .card { padding: 15px; border-width: 1px; } /* 手機上卡片內距變小、邊框變細 */
      
      /* 將行事曆上方的按鈕與標題改為垂直置中排列，避免擠壓 */
      .fc .fc-toolbar {
        flex-direction: column;
        gap: 12px;
      }
      .fc .fc-toolbar-title { font-size: 1.2em; }
      
      /* 👑 關鍵：讓手機版上的長課程名稱可以自動換行，不會被切掉 */
      .fc-event-title {
        white-space: normal !important; 
        font-size: 12px !important;
        line-height: 1.3;
      }
      
      /* 稍微縮小日期的數字大小 */
      .fc-daygrid-day-number { font-size: 14px; }
    }
  </style>
</head>
<body>

  <div class="container">
    <div class="card">
      <h2 style="color: #B8A86F; margin-top: 0;">✨ 暑期課程行事曆</h2>
      <div id="calendar"></div>
    </div>
  </div>

  <script>
    document.addEventListener('DOMContentLoaded', function() {
      // 👑 請記得將這裡替換為您的 CSV 發布網址
      const csvUrl = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vT9JvTZUpN1YVXaHTjJ8gX-DfQ098myqRPaNJNMl8ZriVjVmxP-SNFHn_b7OKDiOQAkKB7SiUSQj4OD/pub?output=csv';

      Papa.parse(csvUrl, {
        download: true,
        header: true,
        skipEmptyLines: true,
        complete: function(results) {
          const eventsData = results.data.map(row => {
            const dateParts = row.date.split('/');
            const formattedDate = `${dateParts[0]}-${dateParts[1].padStart(2, '0')}-${dateParts[2].padStart(2, '0')}`;
            
            // 根據班級名稱設定對應的底色
            let eventColor = '#E0E0E0'; 
            if (row.name.includes('週一') || row.name.includes('瑜珈')) {
              eventColor = '#FCE8B2'; 
            } else if (row.name.includes('週二')) {
              eventColor = '#CEEAD6'; 
            } else if (row.name.includes('週四')) {
              eventColor = '#FAD2CF'; 
            }

            return {
              title: `${row.name}`, // 標題目前只放課程名稱
              start: `${formattedDate}T${row.start}:00`,
              end: `${formattedDate}T${row.end}:00`,
              backgroundColor: eventColor,
              display: 'block' 
            };
          });

          const calendarEl = document.getElementById('calendar');
          const calendar = new FullCalendar.Calendar(calendarEl, {
            initialView: 'dayGridMonth',
            locale: 'zh-tw',
            headerToolbar: {
              left: 'prev,next today',
              center: 'title',
              right: 'dayGridMonth,listMonth'
            },
            events: eventsData,
            
            // 👑 關鍵新增：設定為 false 即可隱藏事件上的時間（如 16:45）
            // 👑 關鍵設定：時間顯示 24小時制，取消 AM/PM
            eventTimeFormat: { 
              hour: '2-digit',
              minute: '2-digit',
              hour12: false 
            },
            displayEventTime: true,
            // 👑 2. 新增動態監聽：當學員旋轉手機螢幕或縮放視窗時，自動切換最適合的排版
            windowResize: function(arg) {
              if (window.innerWidth < 768) {                
                calendar.changeView('listMonth');                
              } else {
                calendar.changeView('dayGridMonth');
              }
            }

          });

          calendar.render();
        }
      });
    });
  </script>

</body>
</html>
